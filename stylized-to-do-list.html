<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Styled To-Do List</title>
    <link rel="stylesheet" href="styles.css"
</head>

<body>

<div class="todo-list">
    <h1>To Do List</h1>
<ul class="todo-list">
    <li>
        <input type="checkbox" id="taxes">
        <label for="taxes">File taxes for 2025</label>

        <ul class="sub-item">
            <li><a href="https://www.taxes.com" target="_blank" class="sub-item-link">Access Tax Account</a></li>
        </ul>

    </li>

    <li>
        <input type="checkbox" id="japan_trip">
        <label for="japan_trip">Book trip to Japan</label>


        <ul class="sub-item">
            <li><a href="https://www.agoda.com" target="_blank" class="sub-item-link">Access booking website Agoda</a></li>
        </ul>

    </li>

    <li>
        <input type="checkbox" id="planter">
        <label for="planter">Buy planter</label>


        <ul class="sub-item">
            <li><a href="https://www.plants.com" target="_blank" class="sub-item-link">Buy planters here</a></li>
        </ul>


    </li>

    <li>
        <input type="checkbox" id="japanese_lessons">
        <label for="japanese_lessons">Sign up for Japanese lessons</label>


        <ul class="sub-item">
            <li><a href="https://www.japanesepod101.com/welcome" target="_blank" class="sub-item-link">JapanesePod 101</a></li>
        </ul>

    </li>
    </ul>
    </div>
</body>

</html>
